name: Daily Archive

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - run: pip install yfinance pandas requests pytz
    - run: python dashboard.py
    - run: |
        git config --global user.name 'Archivist'
        git config --global user.email 'bot@github.com'
        git add index.html history.csv
        git commit -m "Auto-archive" || exit 0
        git push
